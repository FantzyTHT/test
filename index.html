<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Source Tool</title>
    <style>
        body {
            font-family: monospace;
            background: #111;
            color: #0f0;
            padding: 20px;
        }

        input, button {
            font-size: 16px;
            padding: 8px;
            margin-top: 10px;
        }

        #output {
            white-space: pre-wrap;
            margin-top: 20px;
            border-top: 1px solid #0f0;
            padding-top: 10px;
            max-height: 600px;
            overflow: auto;
        }
    </style>
</head>
<body>

<h2>View Page Source Tool</h2>

<input id="urlInput" type="text" placeholder="Enter URL (https://...)" size="60">
<button onclick="getSource()">Fetch</button>

<div id="output">Result will appear here...</div>

<script>
function getSource() {
    const url = document.getElementById("urlInput").value;
    const output = document.getElementById("output");

    if (!url.startsWith("http")) {
        output.textContent = "Enter a valid http/https URL";
        return;
    }

    output.textContent = "Loading...";

    fetch("/fetch?url=" + encodeURIComponent(url))
        .then(res => res.text())
        .then(data => {
            output.textContent = data;
        })
        .catch(err => {
            output.textContent = "Error: " + err;
        });
}
</script>

</body>
</html>
